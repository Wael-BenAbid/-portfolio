<!DOCTYPE html>
<html>
<body>
  <h1>Session Storage Check</h1>
  <button onclick="checkSession()">Check Session Storage</button>
  <div id="result"></div>

  <script>
    function checkSession() {
      const resultDiv = document.getElementById('result');
      const authUser = sessionStorage.getItem('auth_user');
      
      if (authUser) {
        resultDiv.innerHTML = `
          <p style="color: green;">SessionStorage has auth_user data</p>
          <p><strong>Data:</strong></p>
          <pre style="background: #f0f0f0; padding: 10px; border-radius: 5px;">${authUser}</pre>
        `;
      } else {
        resultDiv.innerHTML = '<p style="color: red;">SessionStorage has no auth_user data</p>';
      }
      
      const redirectedToAuth = sessionStorage.getItem('redirected_to_auth');
      if (redirectedToAuth) {
        resultDiv.innerHTML += `<p style="color: blue;">redirected_to_auth: ${redirectedToAuth}</p>`;
      }
    }
    
    function clearSession() {
      sessionStorage.removeItem('auth_user');
      sessionStorage.removeItem('redirected_to_auth');
      alert('SessionStorage cleared');
      checkSession();
    }
  </script>
  
  <p><button onclick="clearSession()">Clear Session Storage</button></p>
</body>
</html>
