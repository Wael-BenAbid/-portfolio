<!DOCTYPE html>
<html>
<body>
  <h1>Fill Login Form</h1>
  <button onclick="fillForm()">Click to fill login form</button>
  <script>
    function fillForm() {
      // First, make sure we're on the login page
      if (window.location.href !== 'http://localhost:3001/#/auth') {
        window.location.href = 'http://localhost:3001/#/auth';
        return;
      }

      // Wait for the page to load
      setTimeout(() => {
        const emailInput = document.querySelector('input[placeholder="Enter your email"]');
        const passwordInput = document.querySelector('input[placeholder="Enter your password"]');
        const loginButton = document.querySelector('button:contains("Sign In")');

        console.log('Email input found:', !!emailInput);
        console.log('Password input found:', !!passwordInput);
        console.log('Login button found:', !!loginButton);

        if (emailInput) {
          emailInput.value = 'test@example.com';
        }
        if (passwordInput) {
          passwordInput.value = 'testpassword';
        }
        if (loginButton) {
          loginButton.click();
        }
      }, 1000);
    }
  </script>
</body>
</html>
