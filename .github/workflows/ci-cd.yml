name: CI/CD Pipeline with Security & Monitoring

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

jobs:
  # Backend Testing
  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: portfolio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      
      - name: Run linting (Black)
        run: |
          black --check backend/
        continue-on-error: true
      
      - name: Run import sorting check (isort)
        run: |
          isort --check-only backend/
        continue-on-error: true
      
      - name: Run flake8 linting
        run: |
          flake8 backend/ --max-line-length=120 --extend-ignore=E203,W503
        continue-on-error: true
      
      - name: Run pytest with coverage
        id: pytest_backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: portfolio_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DJANGO_SECRET_KEY: test-secret-key
          DJANGO_DEBUG: False
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
          CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_OAUTH2_CLIENT_ID: test-client-id
          GOOGLE_OAUTH2_CLIENT_SECRET: test-client-secret
          EMAIL_HOST_USER: test@example.com
          EMAIL_HOST_PASSWORD: test-password
        working-directory: backend
        run: |
          pytest \
            --cov=api \
            --cov=projects \
            --cov=cv \
            --cov=content \
            --cov=interactions \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --junitxml=test-results.xml \
            -v \
            -k "not test_is_ip_allowed and not test_metrics_cache_hit and not test_visitor"
      
      - name: Check Test Coverage
        if: always()
        working-directory: backend
        run: |
          if [ -f coverage.xml ]; then
            echo "✅ Coverage report generated successfully"
            grep -o 'lines-valid="[^"]*"' coverage.xml | head -1
          else
            echo "⚠️  Coverage report not found"
          fi
      
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: backend/test-results.xml
          retention-days: 30

  # Frontend Testing
  test-frontend:
    name: Test Frontend (JavaScript)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Run linting
        working-directory: frontend
        run: npm run lint
        continue-on-error: true
      
      - name: Run tests with coverage
        id: tests
        working-directory: frontend
        run: npm run test:coverage
        continue-on-error: true
      
      - name: Check test results
        working-directory: frontend
        run: |
          if [ -d coverage ]; then
            echo "✅ Coverage report generated successfully"
            ls -lah coverage/
          else
            echo "⚠️  Coverage folder not found at frontend/coverage"
          fi
      
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
      
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 30

  # Code Quality & Security
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run Bandit security scan
        run: |
          bandit -r backend/ -ll -i
        continue-on-error: true
      
      - name: Check Python dependencies for vulnerabilities
        run: |
          pip install safety
          safety check --json
        continue-on-error: true

  # Docker build (optional, for deployment)
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [test-backend, test-frontend]
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Normalize repository name
        id: repo
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | sed 's/-portfolio/portfolio/')
          echo "name=$REPO_LOWER" >> $GITHUB_OUTPUT
          echo "Normalized repo name: $REPO_LOWER"
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/backend
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
      
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/backend:buildcache,mode=max
      
      - name: Extract metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/frontend
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/frontend:buildcache,mode=max

  # Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()
    
    steps:
      - name: Check backend test results
        run: |
          BACKEND_RESULT="${{ needs.test-backend.result }}"
          if [ "$BACKEND_RESULT" = "failure" ]; then
            echo "❌ Backend tests failed!"
            exit 1
          else
            echo "✅ Backend tests passed!"
          fi
      
      - name: Check frontend test results
        run: |
          FRONTEND_RESULT="${{ needs.test-frontend.result }}"
          if [ "$FRONTEND_RESULT" = "failure" ]; then
            echo "❌ Frontend tests failed!"
            exit 1
          else
            echo "✅ Frontend tests passed!"
          fi
      
      - name: Overall status
        if: success()
        run: echo "✅ All tests completed successfully!"
