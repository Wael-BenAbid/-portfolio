services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python manage.py load_fixture_once && gunicorn portfolio.wsgi:application --config gunicorn.conf.py
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: portfolio.settings.prod
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "portfolio-4kcq.onrender.com,.onrender.com,wael-ben-abid.me,www.wael-ben-abid.me"
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://wael-ben-abid.me,https://www.wael-ben-abid.me"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://wael-ben-abid.me,https://www.wael-ben-abid.me,https://portfolio-4kcq.onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: REDIS_URL
        sync: false
      - key: GOOGLE_OAUTH2_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH2_CLIENT_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@wael-ben-abid.me"
      - key: FRONTEND_URL
        value: "https://wael-ben-abid.me"
